<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}

.wrapper{
  max-width:960px;
  margin:60px auto;
  padding:0 20px;
}

h1{
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  border-bottom:1px solid #222;
  padding-bottom:15px;
  margin-bottom:30px;
  color:#fff;
}

/* ----- LOGIN ----- */
#login{
  background:#0f0f0f;
  border:1px solid #222;
  padding:25px;
  text-align:center;
}

/* ----- BUTTONS (base) ----- */
button{
  background:#111;
  border:1px solid #333;
  color:#fff;
  padding:10px 15px;
  cursor:pointer;
  letter-spacing:2px;
  text-transform:uppercase;
  font-size:12px;
  transition:.2s;
}
button:hover{border-color:#555;background:#1a1a1a}

/* ----- STATS BAR ----- */
.stats-bar{
  display:flex;
  gap:12px;
  margin-bottom:28px;
  flex-wrap:wrap;
}
.stat-box{
  background:#0f0f0f;
  border:1px solid #1a1a1a;
  padding:10px 18px;
  font-size:11px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#555;
}
.stat-box strong{
  display:block;
  font-size:20px;
  color:#ccc;
  letter-spacing:0;
  margin-top:4px;
  font-weight:normal;
}

/* ----- CARD ----- */
.card{
  background:#0f0f0f;
  border:1px solid #222;
  padding:18px;
  margin-bottom:14px;
  transition:border-color .15s;
}
.card:hover{border-color:#2a2a2a}

.card-meta{
  font-size:11px;
  color:#444;
  margin-bottom:10px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  letter-spacing:.4px;
}

.name{
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:6px;
}
.stars{color:#ccc;letter-spacing:2px;font-size:13px;margin-bottom:2px}
.comment{color:#ccc;font-size:14px;margin:10px 0;line-height:1.65}

.actions{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.approve{border-color:#1e3c1e;color:#5a9a5a}
.approve:hover{border-color:#2e5c2e;background:#0a150a}
.reject{border-color:#3c1e1e;color:#9a5a5a}
.reject:hover{border-color:#5c2e2e;background:#150a0a}
.detail-btn{border-color:#1a1a2a;color:#778;font-size:11px}
.detail-btn:hover{border-color:#2a2a4a;color:#aab}
.detail-btn.open{border-color:#1e3a5a;color:#6699bb;background:#080c10}

/* ----- DETAILS PANEL ----- */
.details-panel{
  display:none;
  background:#070b0e;
  border:1px solid #101820;
  border-left:2px solid #1e3a5a;
  padding:16px 18px;
  margin-top:12px;
}
.details-panel.open{display:block}

.details-panel h4{
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#33506a;
  margin:0 0 14px;
  padding-bottom:8px;
  border-bottom:1px solid #0d1820;
}

.details-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
  margin-bottom:14px;
}

.detail-item{
  font-size:11px;
  color:#446;
  letter-spacing:.4px;
  text-transform:uppercase;
}
.detail-item strong{
  display:block;
  font-size:13px;
  color:#99b;
  text-transform:none;
  letter-spacing:0;
  margin-top:3px;
  font-weight:normal;
}

.detail-pages-label{
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#334;
  margin-bottom:7px;
}
.page-chip{
  display:inline-block;
  font-size:11px;
  color:#557;
  background:#0c1015;
  border:1px solid #151d28;
  padding:3px 10px;
  margin:2px 3px 2px 0;
  letter-spacing:.4px;
}

.details-msg{
  font-size:12px;
  color:#335;
  letter-spacing:1px;
  text-align:center;
  padding:8px;
}

.hidden{display:none}

/* ----- ROLE SELECTOR ----- */
.role-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:12px 0 0;
  padding-top:12px;
  border-top:1px solid #181818;
  align-items:center;
}
.role-label-pre{
  font-size:10px;
  letter-spacing:1.5px;
  color:#2a2a2a;
  text-transform:uppercase;
  margin-right:2px;
}
.role-opt{
  display:inline-flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
  padding:5px 11px;
  border:1px solid #1a1a1a;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#333;
  transition:.15s;
  user-select:none;
  border-radius:3px;
}
.role-opt:hover{border-color:#2a2a2a;color:#666;background:#0e0e0e}
.role-opt.active{border-color:#303030;color:#bbb;background:#141414}
.ro-dot{
  width:8px;height:8px;
  border:1px solid #333;
  border-radius:1px;
  flex-shrink:0;
  transition:.15s;
}
.role-opt.active .ro-dot{background:#888;border-color:#888}
</style>
</head>

<body>
<div class="wrapper">

  <h1>Admin Panel</h1>

  <div id="login">
    <button onclick="login()">Google ile Giriş</button>
  </div>

  <div id="panel" class="hidden">
    <h1>Bekleyen Yorumlar</h1>
    <div id="stats-bar" class="stats-bar"></div>
    <div id="list"></div>
  </div>

</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore, collection, query, where,
  getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import {
  getAuth, signInWithPopup, GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

/* ── CONFIG ─────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "AIzaSyA-RWDPv06t_4TXvzU06DzPhsQXKZ1Bkec",
  authDomain:        "ballasnet-100c0.firebaseapp.com",
  projectId:         "ballasnet-100c0",
  storageBucket:     "ballasnet-100c0.firebasestorage.app",
  messagingSenderId: "31456745285",
  appId:             "1:31456745285:web:2db93eed879bb42b81102c"
};
const ADMIN_EMAIL = "pepebenimsev@gmail.com";

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);
const prov = new GoogleAuthProvider();

/* ── HELPERS ─────────────────────────────────────────────── */
function escapeHtml(text) {
  if (text == null) return '';
  const d = document.createElement('div');
  d.textContent = String(text);
  return d.innerHTML;
}

function fmtDate(ts) {
  if (!ts) return 'Belirsiz';
  try { return new Date(ts.toDate()).toLocaleString('tr-TR'); }
  catch { return 'Belirsiz'; }
}

/* ── ROLE TRACKING ───────────────────────────────────────── */
const selectedRoles = {};

window.setRole = function(id, role) {
  selectedRoles[id] = role;
  ['user','kurucu','admin1','admin2'].forEach(r => {
    const el = document.getElementById(`role-${r}-${id}`);
    if (el) el.classList.toggle('active', r === role);
  });
};

/* ── LOGIN ───────────────────────────────────────────────── */
window.login = async function () {
  try {
    const res = await signInWithPopup(auth, prov);
    if (res.user.email !== ADMIN_EMAIL) { alert('Yetkisiz giriş'); return; }
    document.getElementById('login').style.display = 'none';
    document.getElementById('panel').classList.remove('hidden');
    loadComments();
  } catch (e) { alert('Giriş hatası: ' + e.message); }
};

/* ── LOAD PENDING ────────────────────────────────────────── */
async function loadComments() {
  const snap = await getDocs(
    query(collection(db, 'comments'), where('status', '==', 'pending'))
  );

  const now   = Date.now();
  const ms48h = 48 * 60 * 60 * 1000;
  let count48h = 0;

  snap.forEach(d => {
    const c = d.data();
    if (c.createdAt && (now - c.createdAt.toMillis()) < ms48h) count48h++;
  });

  /* Stats bar */
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-box">Bekleyen<strong>${snap.size}</strong></div>
    <div class="stat-box">Son 48 Saat<strong>${count48h}</strong></div>
  `;

  /* Cards */
  const list = document.getElementById('list');
  list.innerHTML = '';

  if (snap.size === 0) {
    list.innerHTML = '<p style="color:#444;text-align:center;padding:40px;letter-spacing:1px;font-size:13px">Bekleyen yorum yok.</p>';
    return;
  }

  snap.forEach(d => {
    const c     = d.data();
    const page  = escapeHtml(c.pageId || '—');
    const date  = c.createdAt ? new Date(c.createdAt.toDate()).toLocaleString('tr-TR') : 'Belirsiz';
    const stars = '★'.repeat(Math.min(c.rating || 0, 5));
    const ip    = escapeHtml(c.ip   || '');

    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${d.id}`;
    div.dataset.ip = c.ip || '';

    div.innerHTML = `
      <div class="card-meta">
        <span>📄 ${page}</span>
        <span>📅 ${date}</span>
      </div>
      <div class="name">${escapeHtml(c.name)}</div>
      <div class="stars">${stars}</div>
      <div class="comment">${escapeHtml(c.comment)}</div>
      <div class="role-row">
        <span class="role-label-pre">Rol</span>
        <span class="role-opt active" id="role-user-${d.id}" onclick="setRole('${d.id}','user')"><span class="ro-dot"></span>KULLANICI</span>
        <span class="role-opt" id="role-kurucu-${d.id}" onclick="setRole('${d.id}','kurucu')"><span class="ro-dot"></span>KURUCU</span>
        <span class="role-opt" id="role-admin1-${d.id}" onclick="setRole('${d.id}','admin1')"><span class="ro-dot"></span>ADMİN1</span>
        <span class="role-opt" id="role-admin2-${d.id}" onclick="setRole('${d.id}','admin2')"><span class="ro-dot"></span>ADMİN2</span>
      </div>
      <div class="actions">
        <button class="approve" onclick="approve('${d.id}')">ONAYLA</button>
        <button class="reject"  onclick="reject('${d.id}')">REDDET</button>
        <button class="detail-btn" id="dbtn-${d.id}" onclick="toggleDetails('${d.id}')">▸ DETAYLAR</button>
      </div>
      <div class="details-panel" id="details-${d.id}">
        <div class="details-msg">Yükleniyor…</div>
      </div>
    `;
    selectedRoles[d.id] = 'user';
    list.appendChild(div);
  });
}

/* ── APPROVE / REJECT ────────────────────────────────────── */
window.approve = async function (id) {
  const role = selectedRoles[id] || 'user';
  await updateDoc(doc(db, 'comments', id), { status: 'approved', role: role });
  loadComments();
};
window.reject = async function (id) {
  await updateDoc(doc(db, 'comments', id), { status: 'rejected' });
  loadComments();
};

/* ── DETAILS TOGGLE ──────────────────────────────────────── */
window.toggleDetails = async function (id) {
  const panel = document.getElementById(`details-${id}`);
  const btn   = document.getElementById(`dbtn-${id}`);

  const isOpen = panel.classList.contains('open');

  if (isOpen) {
    panel.classList.remove('open');
    btn.classList.remove('open');
    btn.textContent = '▸ DETAYLAR';
    return;
  }

  panel.classList.add('open');
  btn.classList.add('open');
  btn.textContent = '▾ DETAYLAR';

  /* Already loaded? */
  if (panel.dataset.loaded === '1') return;

  const card = document.getElementById(`card-${id}`);
  const ip   = card.dataset.ip;

  if (!ip) {
    panel.innerHTML = '<div class="details-msg">IP bilgisi bulunamadı.</div>';
    return;
  }

  try {
    const snap = await getDocs(
      query(collection(db, 'comments'), where('ip', '==', ip))
    );

    const yorumlar = [];
    snap.forEach(d => yorumlar.push({ id: d.id, ...d.data() }));

    if (yorumlar.length === 0) {
      panel.innerHTML = '<div class="details-msg">Kullanıcıya ait yorum bulunamadı.</div>';
      return;
    }

    const now   = Date.now();
    const ms48h = 48 * 60 * 60 * 1000;
    const son48h = yorumlar.filter(y =>
      y.createdAt && (now - y.createdAt.toMillis()) < ms48h
    ).length;

    const withTs = yorumlar
      .filter(y => y.createdAt)
      .sort((a, b) => a.createdAt.toMillis() - b.createdAt.toMillis());

    const ilk = withTs.length > 0 ? fmtDate(withTs[0].createdAt)                : 'Belirsiz';
    const son = withTs.length > 0 ? fmtDate(withTs[withTs.length - 1].createdAt) : 'Belirsiz';

    const pages = [...new Set(yorumlar.map(y => y.pageId).filter(Boolean))];
    const chips = pages.map(p => `<span class="page-chip">${escapeHtml(p)}</span>`).join('');

    panel.innerHTML = `
      <h4>Kullanıcı Detayları</h4>
      <div class="details-grid">
        <div class="detail-item">Son 48 Saatte<strong>${son48h}</strong></div>
        <div class="detail-item">Toplam Yorum<strong>${yorumlar.length}</strong></div>
        <div class="detail-item">İlk Yorum<strong>${ilk}</strong></div>
        <div class="detail-item">Son Yorum<strong>${son}</strong></div>
      </div>
      <div class="detail-pages-label">Yorum Yapılan Sayfalar</div>
      <div>${chips || '<span class="page-chip">Bilinmiyor</span>'}</div>
    `;
    panel.dataset.loaded = '1';

  } catch (e) {
    console.error(e);
    panel.innerHTML = '<div class="details-msg">Hata: Detaylar yüklenemedi.</div>';
  }
};
</script>
</body>
</html>
